{% extends "base.html" %}

{% block title %}Create Trip - Travel Buddy{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Create New Trip</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="title">Trip Title *</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>

                        <div class="form-group">
                            <label for="destination">Destination *</label>
                            <input type="text" class="form-control" id="destination" name="destination" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="start_date">Start Date *</label>
                                    <input type="date" class="form-control" id="start_date" name="start_date" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="end_date">End Date *</label>
                                    <input type="date" class="form-control" id="end_date" name="end_date" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="budget">Budget (USD)</label>
                                    <input type="number" class="form-control" id="budget" name="budget" min="0" step="0.01">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="group_size">Group Size</label>
                                    <input type="number" class="form-control" id="group_size" name="group_size" min="1" value="1">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="travel_style">Travel Style</label>
                            <select class="form-control" id="travel_style" name="travel_style">
                                <option value="">Select travel style</option>
                                <option value="budget">Budget</option>
                                <option value="luxury">Luxury</option>
                                <option value="backpacker">Backpacker</option>
                                <option value="business">Business</option>
                                <option value="family">Family</option>
                                <option value="adventure">Adventure</option>
                                <option value="cultural">Cultural</option>
                            </select>
                        </div>

                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="is_public" name="is_public" checked>
                            <label class="form-check-label" for="is_public">
                                Make this trip public (others can discover and join)
                            </label>
                        </div>

                        <div class="form-group mt-4">
                            <button type="submit" class="btn btn-primary">Create Trip</button>
                            <a href="{{ url_for('trips.my_trips') }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Create Event - Travel Buddy{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Create Event for "{{ trip.title }}"</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="title">Event Title *</label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>

                        <div class="form-group">
                            <label for="location">Location *</label>
                            <input type="text" class="form-control" id="location" name="location" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="event_date">Date & Time *</label>
                                    <input type="datetime-local" class="form-control" id="event_date" name="event_date" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="duration_hours">Duration (hours)</label>
                                    <input type="number" class="form-control" id="duration_hours" name="duration_hours" min="0.5" max="24" step="0.5" value="2">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="event_type">Event Type</label>
                                    <select class="form-control" id="event_type" name="event_type">
                                        <option value="activity">Activity</option>
                                        <option value="meetup">Meetup</option>
                                        <option value="tour">Tour</option>
                                        <option value="meal">Meal</option>
                                        <option value="transport">Transport</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="max_participants">Max Participants</label>
                                    <input type="number" class="form-control" id="max_participants" name="max_participants" min="1">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="cost_per_person">Cost per Person (USD)</label>
                                    <input type="number" class="form-control" id="cost_per_person" name="cost_per_person" min="0" step="0.01" value="0">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="latitude">Latitude (optional)</label>
                                    <input type="number" class="form-control" id="latitude" name="latitude" step="any">
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="longitude">Longitude (optional)</label>
                            <input type="number" class="form-control" id="longitude" name="longitude" step="any">
                        </div>

                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="is_public" name="is_public" checked>
                            <label class="form-check-label" for="is_public">
                                Make this event public
                            </label>
                        </div>

                        <div class="form-group mt-4">
                            <button type="submit" class="btn btn-primary">Create Event</button>
                            <a href="{{ url_for('trips.trip_details', trip_id=trip.id) }}" class="btn btn-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
